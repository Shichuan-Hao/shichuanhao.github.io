# 网站配置

# 引入主题
theme: jekyll-theme-chirpy

# 网页语言 › http://www.lingoes.net/en/translator/langcode.htm
# 如果名称与文件夹 `_data/locales` 中的某个文件相同，布局语言也会随之更改，
# 否则，布局语言将使用默认值 'en'。
lang: zh-CN

# 更改时区 › https://zones.arilyn.cc
timezone: Asia/Shanghai

# jekyll-seo-tag 设置 › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: 字节漫步 # 主标题

tagline: 探索技术的无限可能 # 显示为副标题

description: >- # 用于 SEO meta 和 atom feed
  字节漫步 - 一个专注于技术分享与个人成长的独立博客。记录编程心得、探索前沿技术、分享生活感悟。

# 填写你网站的协议和主机名。
# 例如：'https://username.github.io'，注意结尾不要带 '/'。
url: "http://www.byteswalk.com"

github:
  username: Shichuan-Hao # 改为你的 GitHub 用户名

twitter:
  username: twitter_username # 改为你的 Twitter 用户名

social:
  # 改为你的全名。
  # 将显示为文章的默认作者和页脚版权所有者
  name: 郝世川
  email: haoshichuan@foxmail.com # 改为你的邮箱地址
  fediverse_handle: # 填写你的 fediverse 标识，例如 "@username@domain.com"
  links:
    # 第一个元素将作为版权所有者的链接
    # - https://twitter.com/username # 改为你的 Twitter 主页
    - https://github.com/Shichuan-Hao # 改为你的 GitHub 主页
    # 取消下面注释可添加更多社交链接
    # - https://www.facebook.com/username
    # - https://www.linkedin.com/in/username

# 网站验证设置
webmaster_verifications:
  google: # 填写你的 Google 验证码
  bing: # 填写你的 Bing 验证码
  alexa: # 填写你的 Alexa 验证码
  yandex: # 填写你的 Yandex 验证码
  baidu: # 填写你的百度验证码
  facebook: # 填写你的 Facebook 验证码

# ↑ --------------------------
# `jekyll-seo-tag` 设置结束

# 网站分析设置
analytics:
  google:
    id: # 填写你的 Google Analytics ID
  goatcounter:
    id: # 填写你的 GoatCounter ID
  umami:
    id: # 填写你的 Umami ID
    domain: # 填写你的 Umami 域名
  matomo:
    id: # 填写你的 Matomo ID
    domain: # 填写你的 Matomo 域名
  cloudflare:
    id: # 填写你的 Cloudflare Web Analytics token
  fathom:
    id: # 填写你的 Fathom Site ID

# 页面浏览量设置
pageviews:
  provider: # 目前仅支持 'goatcounter'

# 配色方案设置
#
# 注意：留空将默认跟随系统偏好，
# 侧边栏左下方会有一个切换按钮在明暗主题间切换。
#
# 可选值：
#
#     light — 使用浅色主题
#     dark — 使用深色主题
#
theme_mode: # [light | dark]

# 媒体资源的 CDN 端点。
# 注意：一旦设置，CDN URL 将被添加到所有媒体资源
#（网站头像、文章图片、音频和视频文件）以 '/' 开头的路径前面
#
# 例如：'https://cdn.com'
cdn:

# 侧边栏头像，支持本地或 CORS 资源
avatar: assets/img/avatar/avatar.png

# 用于 SEO `og:image` meta 标签的网站级社交预览图片。
# 可通过文章 front matter 中的自定义 `page.image` 覆盖。
social_preview_image: # 字符串，本地或 CORS 资源

# 文章中 TOC（目录）的全局开关。
toc: true

comments:
  # 文章评论系统的全局开关。留空表示禁用。
  provider: # [disqus | utterances | giscus]
  # 提供商选项如下：
  disqus:
    shortname: # 填写 Disqus shortname。› https://help.disqus.com/en/articles/1717111-what-s-a-shortname
  # utterances 设置 › https://utteranc.es/
  utterances:
    repo: # <gh-username>/<repo>
    issue_term: # < url | pathname | title | ...>
  # Giscus 选项 › https://giscus.app
  giscus:
    repo: # <gh-username>/<repo>
    repo_id:
    category:
    category_id:
    mapping: # 可选，默认为 'pathname'
    strict: # 可选，默认为 '0'
    input_position: # 可选，默认为 'bottom'
    lang: # 可选，默认为 `site.lang` 的值
    reactions_enabled: # 可选，默认为 '1'

# 自托管静态资源，可选 › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: # 布尔值，留空表示 false
    # 指定 Jekyll 环境，留空表示两者都生效
    # 仅在 `assets.self_host.enabled` 为 'true' 时生效
    env: # [development | production]

pwa:
  enabled: true # PWA 功能开关（可安装）
  cache:
    enabled: true # PWA 离线缓存开关
    # 此处定义的路径将被排除在 PWA 缓存之外。
    # 通常用于排除与当前网站域名相同的其他网站的 `baseurl`。
    deny_paths:
      # - "/example"  # 匹配 `<SITE_URL>/example/*` 的 URL 将不会被 PWA 缓存

paginate: 10

# 站点的根路径
baseurl: "/bateswalk"

# ------------ 以下选项不建议修改 ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge 选项 › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
